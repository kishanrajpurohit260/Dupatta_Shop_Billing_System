<!DOCTYPE html>
<html>

<head>

    <title>Suppliers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Supplier Management</h2>

<hr>

<form action="/add_supplier" method="POST">

<div class="row">

<div class="col-md-3">

<label>Supplier Name</label>

<input
type="text"
name="supplier_name"
class="form-control"
required>

</div>

<div class="col-md-2">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control">

</div>

<div class="col-md-3">

<label>Address</label>

<input
type="text"
name="address"
class="form-control">

</div>

<div class="col-md-2">

<label>GST Number</label>

<input
type="text"
name="gst_number"
class="form-control">

</div>

<div class="col-md-2">

<br>

<button class="btn btn-success w-100">
Add Supplier
</button>

</div>

</div>

</form>

<hr>

<table class="table table-bordered table-striped table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Supplier Name</th>
<th>Mobile</th>
<th>Address</th>
<th>GST Number</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for s in suppliers %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>

<td>

<a href="/edit_supplier/{{s[0]}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete_supplier/{{s[0]}}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
