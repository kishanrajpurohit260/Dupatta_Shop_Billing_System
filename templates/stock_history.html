<!DOCTYPE html>
<html>

<head>

    <title>Stock History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Stock History</h2>

<hr>

<table class="table table-bordered table-striped table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Product</th>
<th>Old Stock</th>
<th>Added Stock</th>
<th>New Stock</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for h in history %}

<tr>

<td>{{h[0]}}</td>
<td>{{h[1]}}</td>
<td>{{h[2]}}</td>
<td class="text-success"><b>+{{h[3]}}</b></td>
<td>{{h[4]}}</td>
<td>{{h[5]}}</td>

</tr>

{% endfor %}

</tbody>

</table>

<a href="/products" class="btn btn-primary">
Back to Products
</a>

</div>

</body>

</html>
