<!DOCTYPE html>
<html>

<head>

    <title>Add Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Add Stock</h2>

    <hr>

    <form action="/update_stock" method="POST">

        <input type="hidden" name="id" value="{{product[0]}}">

        <div class="mb-3">
            <label><b>Product Name</b></label>
            <input type="text" class="form-control"
                   value="{{product[1]}}" readonly>
        </div>

        <div class="mb-3">
            <label><b>Design</b></label>
            <input type="text" class="form-control"
                   value="{{product[2]}}" readonly>
        </div>

        <div class="mb-3">
            <label><b>Current Stock</b></label>
            <input type="number" class="form-control"
                   value="{{product[4]}}" readonly>
        </div>

        <div class="mb-3">
            <label><b>Add New Stock</b></label>
            <input
                type="number"
                name="new_stock"
                class="form-control"
                required
                min="1">
        </div>

        <button class="btn btn-success">
            Update Stock
        </button>

        <a href="/products" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>

</html>
