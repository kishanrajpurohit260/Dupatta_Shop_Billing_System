<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <h3 class="text-white">Dupatta Shop Billing System</h3>
        </div>
    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 bg-light vh-100 p-3">

                <h4>Menu</h4>

                <a href="/dashboard" class="btn btn-outline-dark w-100 mb-2">
                    Dashboard
                </a>

                <a href="/products" class="btn btn-outline-primary w-100 mb-2">
                    Products
                </a>

                <a href="/billing" class="btn btn-outline-success w-100 mb-2">
                    Billing
                </a>

                <a href="/sales" class="btn btn-outline-warning w-100 mb-2">
                    Sales History
                </a>

                <a href="/purchase" class="btn btn-outline-info w-100 mb-2">
                    Purchase
                </a>

                <a href="/suppliers" class="btn btn-outline-secondary w-100 mb-2">
                    Suppliers
                </a>

                <a href="/settings" class="btn btn-outline-info w-100 mb-2">
                    Settings
                </a>
                
                <a href="/logout" class="btn btn-outline-danger w-100 mb-2">
                    Logout
                </a>

            </div>

            <!-- Main Content -->

            <div class="col-md-10">

                <h2 class="mt-3">Dashboard</h2>

                <div class="row mt-4">

                    <div class="col-md-3">

                        <div class="card text-center p-3">

                            <h5>Total Products</h5>

                            <h2>{{products}}</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center p-3">

                            <h5>Total Bills</h5>

                            <h2>{{bills}}</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center p-3">

                            <h5>Total Sales</h5>

                            <h2>₹{{sales}}</h2>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center p-3">

                            <h5>Low Stock</h5>

                            <h2>{{low_stock}}</h2>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
