<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h2>Sales History</h2>


<table border="1">


<tr>

<th>ID</th>
<th>Customer</th>
<th>Mobile</th>
<th>Total</th>
<th>Date</th>

</tr>


{% for b in bills %}

<tr>

<td>{{b[0]}}</td>

<td>{{b[1]}}</td>

<td>{{b[2]}}</td>

<td>₹ {{b[3]}}</td>

<td>{{b[4]}}</td>

</tr>

<td>

    <a href="/pdf/{{b[0]}}">
    Download PDF
    </a>
    
</td>
{% endfor %}


</table>


</body>

</html>
