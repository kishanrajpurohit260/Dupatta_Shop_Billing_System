<!DOCTYPE html>
<html>

<head>

    <title>Edit Supplier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Supplier</h2>

<hr>

<form action="/update_supplier" method="POST">

<input
type="hidden"
name="id"
value="{{supplier[0]}}">

<div class="mb-3">

<label>Supplier Name</label>

<input
type="text"
name="supplier_name"
class="form-control"
value="{{supplier[1]}}"
required>

</div>

<div class="mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{supplier[2]}}">

</div>

<div class="mb-3">

<label>Address</label>

<input
type="text"
name="address"
class="form-control"
value="{{supplier[3]}}">

</div>

<div class="mb-3">

<label>GST Number</label>

<input
type="text"
name="gst_number"
class="form-control"
value="{{supplier[4]}}">

</div>

<button class="btn btn-success">
Update Supplier
</button>

<a href="/suppliers" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>

</html>
