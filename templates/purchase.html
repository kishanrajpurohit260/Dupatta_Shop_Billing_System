<!DOCTYPE html>
<html>

<head>

    <title>Purchase Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Purchase Entry</h2>

<a href="/purchase_history" class="btn btn-primary mb-3">
    Purchase History
</a>

<hr>

<form action="/save_purchase" method="POST">

<div class="mb-3">

    <label>Supplier</label>

    <select
    name="supplier_id"
    class="form-control"
    required>
    
    <option value="">Select Supplier</option>
    
    {% for s in suppliers %}
    
    <option value="{{s[0]}}">
    {{s[1]}}
    </option>
    
    {% endfor %}
    
    </select>

</div>

<div class="mb-3">

<label>Invoice Number</label>

<input
type="text"
name="invoice_no"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Select Product</label>

<select
name="product_id"
class="form-control"
required>

{% for p in products %}

<option value="{{p[0]}}">
    {{p[1]}} - {{p[2]}}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Quantity</label>

<input
type="number"
name="quantity"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Purchase Price (Per Piece)</label>

<input
type="number"
step="0.01"
name="purchase_price"
class="form-control"
required>

</div>

<button class="btn btn-success">

Save Purchase

</button>

<a href="/dashboard" class="btn btn-secondary">

Back

</a>

</form>

</div>

</body>

</html>
